version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/api
    volumes:
      - ./api:/var/www/api
    networks:
      - blueghost

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/api
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - blueghost

  maria_db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: blueghost
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: trampeska
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - blueghost

networks:
  blueghost:
    driver: bridge

volumes:
  db_data: